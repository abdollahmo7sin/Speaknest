<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="إنشاء حساب جديد في Speaknest">
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <title>تسجيل حساب جديد | Speaknest</title>
</head>

<body>

    <div class="login-page-wrapper">

        <!-- Top Bar -->
        <div class="container">
            <div class="login-topbar">
                <a href="index.html" class="login-sidebar-btn">
                    <i class="fa-solid fa-angles-right"></i>
                </a>
                <a href="reset-password.html" class="login-lang-toggle text-blue">EN</a>
            </div>
        </div>

        <!-- Cloud Shape + Content -->
        <div class="login-cloud-area register-cloud-area">
            <div class="container">
                <div class="row align-items-center justify-content-between">

                    <!-- Form Side (Left side of screen in RTL) -->
                    <div class="col-lg-6 order-lg-2">
                        <div class="login-form-container register-form-container">

                            <!-- Title -->
                            <h1 class="login-title">استعادة كلمة المرور</h1>

                            <!-- Form -->
                            <form class="login-form">

                                <!-- Password Field -->
                                <div class="login-field-group">
                                    <label class="login-field-label" for="newPassword">
                                        ادخل كلمة المرور
                                        <span class="register-field-hint">( حد أدنى 8 أرقام او حروف )</span>
                                    </label>
                                    <div class="login-input-wrapper phone-input-wrapper">
                                        <input type="password" id="newPassword" class="login-input"
                                            placeholder="••••••" autocomplete="new-password" minlength="8" required>
                                        <span class="login-input-icon"><i class="fa-solid fa-lock"></i></span>
                                        <button type="button" class="login-toggle-password" id="toggleNewPassword"
                                            aria-label="إظهار كلمة المرور">
                                            <i class="fa-regular fa-eye"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Confirm Password Field -->
                                <div class="login-field-group">
                                    <label class="login-field-label" for="confirmNewPassword">تأكيد كلمة المرور</label>
                                    <div class="login-input-wrapper phone-input-wrapper">
                                        <input type="password" id="confirmNewPassword" class="login-input"
                                            placeholder="123456" autocomplete="new-password" required>
                                        <span class="login-input-icon"><i class="fa-solid fa-lock"></i></span>
                                        <button type="button" class="login-toggle-password" id="toggleConfirmNewPassword"
                                            aria-label="إظهار تأكيد كلمة المرور">
                                            <i class="fa-regular fa-eye-slash"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Submit Button -->
                                <button type="button" class="login-submit-btn" id="resetPassBtn">
                                    إعادة التعيين
                                </button>

                                <!-- Login Link -->
                                <p class="login-register-link mt-20">
                                    تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a>
                                </p>

                            </form>

                        </div>
                    </div>

                    <!-- Features Side (Right side of screen in RTL) -->
                    <div class="col-lg-5 order-lg-1">
                        <div class="register-features">
                            <ul class="register-features-list">
                                <li><i class="fa-solid  fa-angle-double-left"></i> "دروس فردية مع نخبة من المعلمين."
                                </li>
                                <li><i class="fa-solid  fa-angle-double-left"></i> "نمّ طلاقتك من خلال محادثات واقعية."
                                </li>
                                <li><i class="fa-solid  fa-angle-double-left"></i> "مُخصصة بالكامل لتناسب أهدافك."</li>
                                <li><i class="fa-solid  fa-angle-double-left"></i> "ادفع مقابل كل درس أو اشحن محفظتك
                                    الإلكترونية."</li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Rocket Illustration -->
            <div class="login-rocket">
                <img src="images/rocket.png" alt="Rocket illustration">
            </div>
        </div>

    </div>

    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true"
        data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content otp-modal-content">
                <button type="button" class="btn-close otp-modal-close" data-bs-dismiss="modal" aria-label="Close"></button>
                <div class="modal-body text-center py-50 px-40">
                    <div class="success-checkmark-wrapper mb-30">
                        <i class="fa-solid fa-check success-icon"></i>
                    </div>
                    <p class="success-modal-text">
                        تم تغيير كلمة المرور بنجاح وسيتم تحويلك تلقائياً خلال <span id="redirect-timer">3</span> ثواني
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>


</body>

</html>
