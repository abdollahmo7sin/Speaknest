<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Recover your password at Speaknest">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <title>Password Recovery | Speaknest</title>
</head>

<body>

    <div class="login-page-wrapper">

        <!-- Top Bar -->
        <div class="container">
            <div class="login-topbar">
                <a href="index-en.html" class="login-sidebar-btn">
                    <i class="fa-solid fa-angles-left"></i>
                </a>
                <a href="password-recovery-en.html" class="login-lang-toggle text-blue">AR</a>
            </div>
        </div>

        <!-- Cloud Shape + Content -->
        <div class="login-cloud-area register-cloud-area">
            <div class="container">
                <div class="row align-items-center justify-content-between">

                    <!-- Form Side -->
                    <div class="col-lg-6 order-lg-1">
                        <div class="login-form-container register-form-container">

                            <!-- Title -->
                            <h1 class="login-title">Password Recovery</h1>

                            <!-- Form -->
                            <form class="login-form" action="otp-recovery-en.html">

                                <!-- Email Field -->
                                <div class="login-field-group">
                                    <label class="login-field-label" for="recoveryEmail">Enter email address</label>
                                    <div class="login-input-wrapper phone-input-wrapper">
                                        <input type="email" id="recoveryEmail" class="login-input"
                                            placeholder="example@gmail.com" autocomplete="email" required>
                                        <span class="login-input-icon"><i class="fa-solid fa-envelope"></i></span>
                                    </div>
                                </div>

                                <!-- Submit Button -->
                                <button type="submit" class="login-submit-btn">
                                    Next
                                </button>

                                <!-- Login Link -->
                                <p class="login-register-link mt-20">
                                    Remembered your password? <a href="login-en.html">Login</a>
                                </p>

                            </form>

                        </div>
                    </div>

                    <!-- Features Side -->
                    <div class="col-lg-5 order-lg-2">
                        <div class="register-features">
                            <ul class="register-features-list">
                                <li><i class="fa-solid  fa-angle-double-right"></i> "One-on-one lessons with elite teachers."
                                </li>
                                <li><i class="fa-solid  fa-angle-double-right"></i> "Develop your fluency through real conversations."
                                </li>
                                <li><i class="fa-solid  fa-angle-double-right"></i> "Fully customized to suit your goals."</li>
                                <li><i class="fa-solid  fa-angle-double-right"></i> "Pay per lesson or top up your e-wallet."</li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Rocket Illustration -->
            <div class="login-rocket">
                <img src="images/rocket.png" alt="Rocket illustration">
            </div>
        </div>

    </div>

    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>


</body>

</html>
