<!DOCTYPE html>

<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport" />
    <meta content="تسجيل الدخول إلى Speaknest" name="description" />
    <link href="css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="css/all.min.css" rel="stylesheet" />
    <link href="css/main.css" rel="stylesheet" />
    <title>تسجيل الدخول | Speaknest</title>
</head>

<body>
    <div class="login-page-wrapper">
        <!-- Top Bar -->
        <div class="container">
            <div class="login-topbar">
                <a class="login-sidebar-btn" href="index.html">
                    <i class="fa-solid fa-angles-right"></i>
                </a>
                <a class="login-lang-toggle text-blue" href="login-en.html">EN</a>
            </div>
        </div>
        <!-- Cloud Shape + Content -->
        <div class="login-cloud-area">
            <div class="login-form-container">
                <!-- Title -->
                <h1 class="login-title">تسجيل الدخول</h1>
                <!-- Form -->
                <form class="login-form" id="loginForm">
                    <!-- Email Field -->
                    <div class="login-field-group">
                        <label class="login-field-label" for="loginEmail">ادخل البريد الالكتروني</label>
                        <div class="login-input-wrapper">
                            <span class="login-input-icon"><i class="fa-regular fa-envelope"></i></span>
                            <input autocomplete="email" class="login-input" id="loginEmail"
                                placeholder="example@gmail.com" type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="login-field-group">
                        <label class="login-field-label" for="loginPassword">ادخل كلمة المرور</label>
                        <div class="login-input-wrapper">
                            <input autocomplete="current-password" class="login-input" id="loginPassword"
                                placeholder="••••••" type="password" />
                            <span class="login-input-icon"><i class="fa-solid fa-lock"></i></span>
                            <button aria-label="إظهار كلمة المرور" class="login-toggle-password" id="togglePassword"
                                type="button">
                                <i class="fa-regular fa-eye" id="togglePasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Remember Me + Forgot Password -->
                    <div class="login-options-row">
                        <label class="login-remember" for="rememberMe">
                            <input id="rememberMe" type="checkbox" />
                            <span class="login-remember-checkmark"><i class="fa-regular fa-circle-check"></i></span>
                            <span class="login-remember-text">تذكرني دائماً</span>
                        </label>
                        <a class="login-forgot" href="password-recovery.html">هل نسيت كلمة المرور؟</a>
                    </div>
                    <!-- Submit Button -->
                    <a class="btn btn-blue login-submit-btn" id="loginSubmitBtn" href="user-acc.html">
                        تسجيل الدخول
                    </a>
                    <!-- Divider -->
                    <div class="login-divider">
                        <span class="login-divider-text">طرق أخرى لتسجيل الدخول</span>
                    </div>
                    <!-- Social Login -->
                    <div class="login-social-row">
                        <!-- Google -->
                        <a aria-label="تسجيل الدخول بجوجل" class="login-social-icon" href="login.html" id="loginGoogle">
                            <svg height="28" viewbox="0 0 48 48" width="28" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M24 9.5c3.26 0 5.93 1.12 8.14 2.98l6.07-6.07C34.5 3.13 29.6 1 24 1 14.88 1 7.16 6.48 3.93 14.24l7.07 5.49C12.65 13.36 17.87 9.5 24 9.5z"
                                    fill="#EA4335"></path>
                                <path
                                    d="M46.1 24.55c0-1.57-.14-3.08-.4-4.55H24v8.6h12.42c-.54 2.87-2.17 5.3-4.62 6.94l7.19 5.59C43.38 37.07 46.1 31.27 46.1 24.55z"
                                    fill="#4285F4"></path>
                                <path
                                    d="M11 28.27A14.5 14.5 0 0 1 9.5 24c0-1.49.26-2.93.72-4.27l-7.07-5.49A23.94 23.94 0 0 0 0 24c0 3.87.92 7.53 2.55 10.76l8.45-6.49z"
                                    fill="#FBBC05"></path>
                                <path
                                    d="M24 47c5.52 0 10.16-1.82 13.54-4.95l-7.19-5.59c-1.82 1.22-4.15 1.94-6.35 1.94-6.13 0-11.35-3.86-13.2-9.22l-8.45 6.49C7.16 41.52 14.88 47 24 47z"
                                    fill="#34A853"></path>
                                <path d="M0 0h48v48H0z" fill="none"></path>
                            </svg>
                        </a>
                        <!-- Facebook -->
                        <a aria-label="تسجيل الدخول بفيسبوك" class="login-social-icon" href="login.html"
                            id="loginFacebook">
                            <svg height="28" viewbox="0 0 48 48" width="28" xmlns="http://www.w3.org/2000/svg">
                                <path d="M42 37a5 5 0 0 1-5 5H11a5 5 0 0 1-5-5V11a5 5 0 0 1 5-5h26a5 5 0 0 1 5 5v26z"
                                    fill="#3F51B5"></path>
                                <path
                                    d="M34.37 25H28v14h-6V25h-4v-5h4v-3.5C22 12.16 24.16 10 28.5 10H34v5h-3c-1.1 0-2 .38-2 1.5V20h5.37l-.63 5z"
                                    fill="#fff"></path>
                            </svg>
                        </a>
                        <span class="login-social-separator"></span>
                        <!-- Phone -->
                        <a class="login-phone-btn" href="login-with-phone.html" id="loginPhone">
                            الهاتف الجوال
                            <i class="fa-solid fa-mobile-screen-button"></i>
                        </a>
                    </div>
                    <!-- Register Link -->
                    <p class="login-register-link">
                        ليس لديك حساب؟ <a href="register.html">انشاء حساب</a>
                    </p>
                </form>
            </div>
            <!-- Rocket Illustration -->
            <div class="login-rocket">
                <img alt="Rocket illustration" src="images/rocket.png" />
            </div>
        </div>
    </div>
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
