<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="إنشاء حساب جديد في Speaknest">
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <title>تسجيل حساب جديد | Speaknest</title>
</head>

<body>

    <div class="login-page-wrapper">

        <!-- Top Bar -->
        <div class="container">
            <div class="login-topbar">
                <a href="index.html" class="login-sidebar-btn">
                    <i class="fa-solid fa-angles-right"></i>
                </a>
                <a href="login-with-phone.html" class="login-lang-toggle text-blue">EN</a>
            </div>
        </div>

        <!-- Cloud Shape + Content -->
        <div class="login-cloud-area register-cloud-area">
            <div class="container">
                <div class="row align-items-center justify-content-between">

                    <!-- Form Side (Left side of screen in RTL) -->
                    <div class="col-lg-6 order-lg-2">
                        <div class="login-form-container register-form-container">

                            <!-- Title -->
                            <h1 class="login-title">تسجيل الدخول</h1>

                            <!-- Form -->
                            <form class="login-form" action="otp.html">

                                <!-- Phone Number Field -->
                                <div class="login-field-group">
                                    <label class="login-field-label" for="loginPhone">ادخل رقم الهاتف</label>
                                    <div class="login-input-wrapper phone-input-wrapper">
                                        <div class="country-code-select">
                                            <img src="https://flagcdn.com/w20/eg.png" alt="Egypt" width="20">
                                            <span>+20 |</span>
                                        </div>
                                        <input type="tel" id="loginPhone" class="login-input"
                                            placeholder="01* **** ****" autocomplete="tel" required>
                                        <span class="login-input-icon"><i class="fa-solid fa-phone"></i></span>
                                    </div>
                                </div>

                                <!-- Submit Button -->
                                <button type="submit" class="login-submit-btn" id="sendOtpBtn">
                                    ارسال كلمة مرور مؤقتة
                                </button>

                                <!-- Switch to Email Link -->
                                <p class="login-register-link">
                                    أو تسجيل الدخول عبر <a href="login.html">البريد الالكتروني</a>
                                </p>

                            </form>

                        </div>
                    </div>

                    <!-- Features Side (Right side of screen in RTL) -->
                    <div class="col-lg-5 order-lg-1">
                        <div class="register-features">
                            <ul class="register-features-list">
                                <li><i class="fa-solid  fa-angle-double-left"></i> "دروس فردية مع نخبة من المعلمين."
                                </li>
                                <li><i class="fa-solid  fa-angle-double-left"></i> "نمّ طلاقتك من خلال محادثات واقعية."
                                </li>
                                <li><i class="fa-solid  fa-angle-double-left"></i> "مُخصصة بالكامل لتناسب أهدافك."</li>
                                <li><i class="fa-solid  fa-angle-double-left"></i> "ادفع مقابل كل درس أو اشحن محفظتك
                                    الإلكترونية."</li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Rocket Illustration -->
            <div class="login-rocket">
                <img src="images/rocket.png" alt="Rocket illustration">
            </div>
        </div>

    </div>

    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>


</body>

</html>
